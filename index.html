    <style>
        :root {
            --win-gray: #c0c0c0;
            --win-blue: #000080;
            --win-dark: #808080;
            --win-light: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* === WINDOW 95 STYLES === */
        .window-group {
            position: absolute;
            background: var(--win-gray);
            border: 2px solid #fff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            box-shadow: 1px 1px 0px #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .window-title {
            background: var(--win-blue);
            color: #fff;
            padding: 2px 4px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            width: 16px;
            height: 16px;
            background: var(--win-gray);
            border: 1px solid #fff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            text-align: center;
            line-height: 14px;
            cursor: pointer;
            font-size: 12px;
            color: #000;
        }

        .window-body {
            background: #fff;
            padding: 10px;
            color: #000;
            min-height: 100px;
        }

        /* === SPEED INDICATOR === */
        #speed-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            text-shadow: 1px 1px 0 #000;
            pointer-events: none;
            z-index: 100;
        }

        /* === PHOTO CAROUSEL STYLES === */
        .photo-track {
            display: flex;
            gap: 10px;
            overflow: hidden; /* Hide overflow */
            width: 100%;
            height: 100%;
        }

        .carousel-slide {
            width: 50%; /* Two photos per slide on large screens */
            height: 100%;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .media-box {
            width: 100%;
            height: 100%;
            border: 2px solid #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .responsive-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s;
        }

        .img-caption {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            font-size: 14px;
            pointer-events: none;
        }

        /* === CLOCK === */
        #clock-container {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: var(--win-light);
            background: rgba(0,0,0,0.7);
            padding: 5px;
            border-radius: 4px;
            z-index: 100;
        }
    </style>

            group.add(iris);

            // Pupil

            const pupilMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
            const pupil = new THREE.Mesh(pupilGeo, pupilMat);
            pupil.position.z = 1.7;
            group.add(pupil);

            return {
                group,
                pupilMesh: pupil,
                irisMesh: iris
